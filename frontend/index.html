<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vigilentra - Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
</head>
<body data-page="login" class="bg-slate-50 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md px-4">
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-2 mb-3">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-800">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <h1 class="text-2xl font-bold text-slate-900">Vigilentra</h1>
            </div>
            <p class="text-sm text-slate-500">Cyber Threat Detection System</p>
        </div>

        <div class="card">
            <h2 class="text-lg font-semibold text-slate-900 mb-6">Sign in to your account</h2>

            <div id="login-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-3 mb-4"></div>

            <form id="login-form" class="space-y-4">
                <div>
                    <label for="login-email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                    <input type="email" id="login-email" class="form-input" placeholder="you@institution.edu" required />
                </div>
                <div>
                    <label for="login-password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required />
                </div>
                <button type="submit" id="login-btn" class="btn btn-primary w-full">Sign In</button>
            </form>

            <p class="text-sm text-slate-500 text-center mt-6">
                No account yet? <a href="register.html" class="text-blue-800 font-medium hover:underline">Create one</a>
            </p>
        </div>

        <p class="text-xs text-slate-400 text-center mt-6">Vigilentra v1.0 -- Harvio Tech Industries</p>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
