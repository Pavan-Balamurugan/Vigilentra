<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vigilentra - Register</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
</head>
<body data-page="register" class="bg-slate-50 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md px-4">
        <div class="text-center mb-8">
            <div class="flex items-center justify-center gap-2 mb-3">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-800">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <h1 class="text-2xl font-bold text-slate-900">Vigilentra</h1>
            </div>
            <p class="text-sm text-slate-500">Create your account</p>
        </div>

        <div class="card">
            <h2 class="text-lg font-semibold text-slate-900 mb-6">Register</h2>

            <div id="register-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-3 mb-4"></div>

            <form id="register-form" class="space-y-4">
                <div>
                    <label for="reg-email" class="block text-sm font-medium text-slate-700 mb-1">Email <span class="text-red-500">*</span></label>
                    <input type="email" id="reg-email" class="form-input" placeholder="you@institution.edu" required />
                </div>
                <div>
                    <label for="reg-name" class="block text-sm font-medium text-slate-700 mb-1">Full Name <span class="text-red-500">*</span></label>
                    <input type="text" id="reg-name" class="form-input" placeholder="Your full name" required />
                </div>
                <div>
                    <label for="reg-institution" class="block text-sm font-medium text-slate-700 mb-1">Institution</label>
                    <input type="text" id="reg-institution" class="form-input" placeholder="University or organization (optional)" />
                </div>
                <div>
                    <label for="reg-password" class="block text-sm font-medium text-slate-700 mb-1">Password <span class="text-red-500">*</span></label>
                    <input type="password" id="reg-password" class="form-input" placeholder="Minimum 6 characters" required minlength="6" />
                </div>
                <div>
                    <label for="reg-confirm-password" class="block text-sm font-medium text-slate-700 mb-1">Confirm Password <span class="text-red-500">*</span></label>
                    <input type="password" id="reg-confirm-password" class="form-input" placeholder="Re-enter your password" required />
                </div>
                <button type="submit" id="register-btn" class="btn btn-primary w-full">Create Account</button>
            </form>

            <p class="text-sm text-slate-500 text-center mt-6">
                Already have an account? <a href="index.html" class="text-blue-800 font-medium hover:underline">Sign in</a>
            </p>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
